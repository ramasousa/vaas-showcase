<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agente Multi-Provedor · Claude / GPT / Gemini</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root{
    --topbar-bg:#0b0e14; --topbar-border:rgba(255,255,255,0.08); --topbar-text:#e9edf4; --topbar-muted:#7c8699;
    --chat-bg:#f3f4f7; --chat-surface:#ffffff; --chat-accent:#CC092F; --chat-text:#1d2027; --chat-muted:#6b7280; --chat-border:#e7e8ec;
    --noc-bg:#0a0d12; --noc-surface:#11151d; --noc-border:rgba(255,255,255,0.09); --noc-text:#d7dce6; --noc-muted:#5d6678;
    --c-rag:#9b87f5; --c-mcp:#ff7a45; --c-gate:#2dd4a8; --c-audit:#8b94a6; --c-err:#e5484d;
    --p-claude:#ff7a45; --p-gpt:#10a37f; --p-gemini:#4285F4;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--noc-bg);color:var(--topbar-text);height:100vh;height:100dvh;overflow:hidden;}

  .topbar{background:var(--topbar-bg);border-bottom:1px solid var(--topbar-border);padding:12px 22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  .topbar-left{display:flex;flex-direction:column;gap:2px;}
  .topbar-title{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;}
  .topbar-sub{font-size:10.5px;color:var(--topbar-muted);}
  .mobile-tabs{display:none;gap:6px;}
  .mtab{font-family:'DM Sans';font-size:12px;font-weight:600;background:var(--noc-surface);border:1px solid var(--topbar-border);color:var(--topbar-muted);padding:7px 12px;border-radius:8px;cursor:pointer;position:relative;}
  .mtab.active{color:#fff;border-color:var(--c-mcp);}
  .mtab .badge{position:absolute;top:-6px;right:-6px;background:var(--c-mcp);color:#0b0e14;font-size:9.5px;font-weight:700;border-radius:10px;padding:1px 5px;}

  .shell{display:flex;height:calc(100vh - 53px);height:calc(100dvh - 53px);}
  .panel{flex:1;display:flex;flex-direction:column;min-width:0;}

  .chat-panel{background:var(--chat-bg);border-right:1px solid var(--noc-border);}
  .provider-bar{display:flex;gap:6px;padding:10px 16px;background:var(--chat-surface);border-bottom:1px solid var(--chat-border);flex-wrap:wrap;}
  .prov-btn{font-size:12px;font-weight:700;padding:7px 12px;border-radius:18px;border:1.5px solid var(--chat-border);background:#fff;color:var(--chat-muted);cursor:pointer;display:flex;align-items:center;gap:6px;}
  .prov-btn .dot{width:7px;height:7px;border-radius:50%;}
  .prov-btn.active{border-color:currentColor;background:rgba(0,0,0,0.04);}
  .chat-messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px;}
  .bubble{max-width:88%;padding:11px 14px;border-radius:14px;font-size:13.5px;line-height:1.55;animation:rise .25s ease;white-space:pre-wrap;}
  @keyframes rise{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .bubble.agent{background:var(--chat-surface);color:var(--chat-text);border:1px solid var(--chat-border);align-self:flex-start;border-bottom-left-radius:4px;border-left:3px solid var(--chat-border);}
  .bubble.user{background:var(--chat-accent);color:#fff;align-self:flex-end;border-bottom-right-radius:4px;}
  .bubble.err{background:#fdeaea;color:#9a1d22;border:1px solid #f3c6c8;align-self:flex-start;}
  .bubble-tag{font-family:'DM Mono',monospace;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px;}
  .typing{align-self:flex-start;background:var(--chat-surface);border:1px solid var(--chat-border);border-radius:14px;padding:11px 16px;display:flex;gap:8px;align-items:center;font-size:11.5px;color:var(--chat-muted);}
  .typing .dots{display:flex;gap:4px;}
  .typing .dots span{width:6px;height:6px;border-radius:50%;background:var(--chat-muted);animation:blink 1.2s infinite;}
  .typing .dots span:nth-child(2){animation-delay:.2s;} .typing .dots span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.25;}40%{opacity:1;}}
  .chat-inputbar{padding:10px 16px 8px;background:var(--chat-bg);display:flex;gap:8px;}
  .chat-inputbar input{flex:1;border:1px solid var(--chat-border);background:var(--chat-surface);border-radius:20px;padding:11px 16px;font-size:13px;color:var(--chat-text);outline:none;}
  .chat-inputbar input:focus{border-color:var(--chat-accent);}
  .chat-inputbar input:disabled{opacity:.6;}
  .send-btn{background:var(--chat-accent);color:#fff;border:none;border-radius:50%;width:42px;height:42px;cursor:pointer;font-size:15px;flex-shrink:0;}
  .send-btn:disabled{opacity:.5;}
  .restart-row{padding:0 16px 12px;text-align:center;}
  .restart-link{font-size:11px;color:var(--chat-muted);text-decoration:underline;cursor:pointer;background:none;border:none;}
  .api-note{font-size:9.5px;color:var(--chat-muted);text-align:center;padding-bottom:6px;}

  .orch-panel{background:var(--noc-bg);}
  .orch-head{padding:12px 20px;border-bottom:1px solid var(--noc-border);display:flex;justify-content:space-between;align-items:center;}
  .orch-head b{font-family:'Syne',sans-serif;font-size:13px;}
  .lat-val{font-family:'DM Mono',monospace;font-size:15px;font-weight:600;color:var(--c-mcp);}
  .lat-lbl{font-size:9px;color:var(--noc-muted);text-transform:uppercase;letter-spacing:.5px;text-align:right;}
  .orch-log{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:8px;}
  .log-entry{background:var(--noc-surface);border:1px solid var(--noc-border);border-left:3px solid var(--c-mcp);border-radius:0 8px 8px 0;padding:9px 13px;animation:rise .3s ease;}
  .log-top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:3px;}
  .log-prov{display:flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:9.5px;font-weight:700;text-transform:uppercase;}
  .log-prov .dot{width:6px;height:6px;border-radius:50%;}
  .log-ms{font-family:'DM Mono',monospace;font-size:10px;color:var(--noc-muted);white-space:nowrap;}
  .log-label{font-size:12px;font-weight:600;color:var(--noc-text);}
  .log-detail{font-size:11px;color:var(--noc-muted);font-family:'DM Mono',monospace;margin-top:2px;word-break:break-word;}
  .orch-empty{color:var(--noc-muted);font-size:12px;text-align:center;padding:36px 10px;}
  .orch-legend{padding:9px 18px 12px;border-top:1px solid var(--noc-border);display:flex;gap:9px;flex-wrap:wrap;}
  .leg{display:flex;align-items:center;gap:5px;font-size:9.5px;color:var(--noc-muted);}
  .leg .dot{width:7px;height:7px;border-radius:50%;}

  @media (max-width:900px){
    .mobile-tabs{display:flex;}
    .shell{position:relative;}
    .panel{position:absolute;inset:0;display:none;}
    .panel.mobile-active{display:flex;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-title">Agente Multi-Provedor</div>
    <div class="topbar-sub">Claude · GPT · Gemini — mesmo agente, ferramentas idênticas, backend próprio</div>
  </div>
  <div class="mobile-tabs">
    <button class="mtab active" id="mtab-chat" onclick="switchMobile('chat')">💬 Chat</button>
    <button class="mtab" id="mtab-orch" onclick="switchMobile('orch')">⚙️ Orquestração<span class="badge" id="mtab-badge" style="display:none">0</span></button>
  </div>
</div>

<div class="shell">
  <div class="panel chat-panel mobile-active" id="panel-chat">
    <div class="provider-bar" id="providerBar"></div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-inputbar">
      <input type="text" id="chatInput" placeholder="Digite sua mensagem…" onkeydown="if(event.key==='Enter')handleSend()">
      <button class="send-btn" id="sendBtn" onclick="handleSend()">➤</button>
    </div>
    <div class="restart-row"><button class="restart-link" onclick="restart()">↺ nova conversa</button></div>
    <div class="api-note">Backend em <code id="apiBaseLabel">/api/chat</code> — edite API_BASE no código se hospedar separado do front-end.</div>
  </div>

  <div class="panel orch-panel" id="panel-orch">
    <div class="orch-head"><b>Painel de Orquestração</b><div><div class="lat-val" id="latVal">0 ms</div><div class="lat-lbl">latência acumulada</div></div></div>
    <div class="orch-log" id="orchLog"><div class="orch-empty">Aguardando início da conversa…</div></div>
    <div class="orch-legend">
      <div class="leg"><span class="dot" style="background:var(--p-claude)"></span>Claude</div>
      <div class="leg"><span class="dot" style="background:var(--p-gpt)"></span>GPT</div>
      <div class="leg"><span class="dot" style="background:var(--p-gemini)"></span>Gemini</div>
      <div class="leg"><span class="dot" style="background:var(--c-rag)"></span>RAG</div>
      <div class="leg"><span class="dot" style="background:var(--c-mcp)"></span>MCP</div>
      <div class="leg"><span class="dot" style="background:var(--c-gate)"></span>Gate</div>
    </div>
  </div>
</div>

<script>
// Se o backend estiver no MESMO domínio (recomendado: tudo na Vercel), deixe vazio.
// Se separar front-end (ex: GitHub Pages) do backend (Vercel), coloque a URL completa aqui:
const API_BASE = ''; // ex: 'https://seu-projeto.vercel.app'

const PROVIDERS = [
  { id:'claude', label:'Claude', color:'var(--p-claude)' },
  { id:'gpt', label:'GPT', color:'var(--p-gpt)' },
  { id:'gemini', label:'Gemini', color:'var(--p-gemini)' },
  { id:'compare', label:'Comparar os 3', color:'#ffffff' }
];

let mode = 'claude';
let histories = { claude:[], gpt:[], gemini:[] };
let totalLatency = 0;
let eventCount = 0;
let busy = false;

function el(tag, cls, html){ const e=document.createElement(tag); if(cls)e.className=cls; if(html!==undefined)e.innerHTML=html; return e; }

function renderProviderBar(){
  const bar = document.getElementById('providerBar'); bar.innerHTML='';
  PROVIDERS.forEach(p=>{
    const b = el('button','prov-btn'+(mode===p.id?' active':''));
    b.style.color = p.id==='compare' ? 'var(--chat-text)' : p.color;
    b.innerHTML = (p.id!=='compare' ? `<span class="dot" style="background:${p.color}"></span>` : '🔀 ') + p.label;
    b.onclick = ()=>{ mode = p.id; renderProviderBar(); };
    bar.appendChild(b);
  });
}

function addBubble(text, who, tag, color){
  const wrap = document.getElementById('chatMessages');
  const b = el('div', 'bubble '+who);
  if(tag){ const t = el('span','bubble-tag', tag); t.style.color = color; b.appendChild(t); }
  b.appendChild(document.createTextNode(text));
  if(color && who==='agent') b.style.borderLeftColor = color;
  wrap.appendChild(b);
  wrap.scrollTop = wrap.scrollHeight;
}
function showThinking(label){
  const wrap = document.getElementById('chatMessages');
  const t = el('div','typing', `<span class="dots"><span></span><span></span><span></span></span> ${label}`);
  t.classList.add('thinking-temp'); wrap.appendChild(t); wrap.scrollTop = wrap.scrollHeight;
  return t;
}
function removeNode(n){ if(n) n.remove(); }

function logEvent(provider, color, ev){
  const log = document.getElementById('orchLog');
  const empty = log.querySelector('.orch-empty'); if(empty) empty.remove();
  const kindColor = { rag:'var(--c-rag)', mcp:'var(--c-mcp)', gate:'var(--c-gate)', audit:'var(--c-audit)' }[ev.kind] || 'var(--c-mcp)';
  const entry = el('div','log-entry'); entry.style.borderLeftColor = kindColor;
  const top = el('div','log-top');
  const provSpan = el('span','log-prov', `<span class="dot" style="background:${color}"></span>${provider}`);
  const msSpan = el('span','log-ms', ev.ms+' ms');
  top.appendChild(provSpan); top.appendChild(msSpan);
  entry.appendChild(top);
  entry.appendChild(el('div','log-label', ev.name || ev.label));
  entry.appendChild(el('div','log-detail', ev.detail + (ev.input ? ('\nargs: '+JSON.stringify(ev.input)) : '')));
  log.appendChild(entry); log.scrollTop = log.scrollHeight;

  totalLatency += ev.ms; eventCount += 1;
  document.getElementById('latVal').textContent = totalLatency.toLocaleString('pt-BR')+' ms';
  const badge = document.getElementById('mtab-badge');
  badge.style.display='inline-block'; badge.textContent = eventCount;
}

async function callBackend(provider, history, userMessage){
  const t0 = performance.now();
  const res = await fetch(API_BASE + '/api/chat', {
    method:'POST',
    headers:{ 'Content-Type':'application/json' },
    body: JSON.stringify({ provider, history, userMessage })
  });
  const elapsed = Math.round(performance.now()-t0);
  if(!res.ok){ const errText = await res.text(); throw new Error('HTTP '+res.status+' — '+errText); }
  const data = await res.json();
  return { ...data, gatewayMs: elapsed };
}

const PROV_COLOR = { claude:'var(--p-claude)', gpt:'var(--p-gpt)', gemini:'var(--p-gemini)' };
const PROV_LABEL = { claude:'Claude', gpt:'GPT', gemini:'Gemini' };

async function runProvider(provider, userMessage){
  const color = PROV_COLOR[provider];
  const thinking = showThinking(PROV_LABEL[provider]+' pensando…');
  try{
    const data = await callBackend(provider, histories[provider], userMessage);
    removeNode(thinking);
    histories[provider].push({ role:'user', text:userMessage });
    histories[provider].push({ role:'assistant', text:data.text });
    addBubble(data.text, 'agent', PROV_LABEL[provider], color);
    logEvent(PROV_LABEL[provider], color, { name:'chamada ao modelo', detail:'POST /api/chat · round-trip total', ms:data.gatewayMs });
    (data.toolTrace||[]).forEach(t=> logEvent(PROV_LABEL[provider], color, t));
  }catch(err){
    removeNode(thinking);
    addBubble('⚠️ ['+PROV_LABEL[provider]+'] '+err.message, 'err');
  }
}

async function sendUserMessage(text){
  if(busy) return;
  addBubble(text, 'user');
  setInputEnabled(false);
  if(mode === 'compare'){
    await Promise.allSettled(['claude','gpt','gemini'].map(p=>runProvider(p, text)));
  } else {
    await runProvider(mode, text);
  }
  setInputEnabled(true);
}

function setInputEnabled(on){
  document.getElementById('chatInput').disabled = !on;
  document.getElementById('sendBtn').disabled = !on;
  busy = !on;
}

function handleSend(){
  const input = document.getElementById('chatInput');
  const val = input.value.trim();
  if(!val || busy) return;
  input.value='';
  sendUserMessage(val);
}

function switchMobile(view){
  document.getElementById('panel-chat').classList.toggle('mobile-active', view==='chat');
  document.getElementById('panel-orch').classList.toggle('mobile-active', view==='orch');
  document.getElementById('mtab-chat').classList.toggle('active', view==='chat');
  document.getElementById('mtab-orch').classList.toggle('active', view==='orch');
}

function restart(){
  histories = { claude:[], gpt:[], gemini:[] };
  totalLatency = 0; eventCount = 0;
  document.getElementById('chatMessages').innerHTML='';
  document.getElementById('orchLog').innerHTML='<div class="orch-empty">Aguardando início da conversa…</div>';
  document.getElementById('latVal').textContent = '0 ms';
  document.getElementById('mtab-badge').style.display='none';
  setInputEnabled(true);
  document.getElementById('apiBaseLabel').textContent = (API_BASE || '') + '/api/chat';
  addBubble('Olá! Escolha um provedor acima (ou "Comparar os 3") e me conta o que você precisa — ex: organizar o pagamento de um veículo.', 'agent');
}

renderProviderBar();
restart();
</script>
</body>
</html>
