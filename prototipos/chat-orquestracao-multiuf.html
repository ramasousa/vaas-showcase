<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protótipo Navegável v3 · Checkout Veicular Inteligente (SP · RJ · MG)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root{
    --topbar-bg:#0b0e14; --topbar-border:rgba(255,255,255,0.08); --topbar-text:#e9edf4; --topbar-muted:#7c8699;
    --chat-bg:#f3f4f7; --chat-surface:#ffffff; --chat-accent:#CC092F; --chat-accent-soft:#fdeaec;
    --chat-text:#1d2027; --chat-muted:#6b7280; --chat-border:#e7e8ec;
    --noc-bg:#0a0d12; --noc-surface:#11151d; --noc-surface2:#161b25; --noc-border:rgba(255,255,255,0.09);
    --noc-text:#d7dce6; --noc-muted:#5d6678;
    --c-gateway:#4ea8de; --c-rag:#9b87f5; --c-mcp:#ff7a45; --c-gate:#2dd4a8; --c-audit:#8b94a6;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--noc-bg);color:var(--topbar-text);height:100vh;height:100dvh;overflow:hidden;}

  .topbar{background:var(--topbar-bg);border-bottom:1px solid var(--topbar-border);padding:14px 22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
  .topbar-left{display:flex;flex-direction:column;gap:2px;}
  .topbar-title{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;}
  .topbar-sub{font-size:11px;color:var(--topbar-muted);}
  .topbar-mid{display:flex;align-items:center;gap:8px;}
  .breadcrumb{display:flex;gap:6px;align-items:center;}
  .bc-step{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--topbar-muted);padding:5px 10px;border-radius:20px;border:1px solid var(--topbar-border);transition:all .25s;}
  .bc-step.active{color:#0b0e14;background:var(--c-mcp);border-color:var(--c-mcp);font-weight:600;}
  .bc-step.done{color:var(--c-gate);border-color:rgba(45,212,168,0.4);}
  .uf-chip{font-family:'DM Mono',monospace;font-size:10.5px;font-weight:700;padding:5px 11px;border-radius:20px;background:rgba(155,135,245,0.15);color:var(--c-rag);border:1px solid rgba(155,135,245,0.4);display:none;}
  .mobile-tabs{display:none;gap:6px;}
  .mtab{font-family:'DM Sans';font-size:12px;font-weight:600;background:var(--noc-surface);border:1px solid var(--topbar-border);color:var(--topbar-muted);padding:7px 12px;border-radius:8px;cursor:pointer;position:relative;}
  .mtab.active{color:#fff;border-color:var(--c-mcp);}
  .mtab .badge{position:absolute;top:-6px;right:-6px;background:var(--c-mcp);color:#0b0e14;font-size:9.5px;font-weight:700;border-radius:10px;padding:1px 5px;}

  .shell{display:flex;height:calc(100vh - 57px);height:calc(100dvh - 57px);}
  .panel{flex:1;display:flex;flex-direction:column;min-width:0;}

  .chat-panel{background:var(--chat-bg);border-right:1px solid var(--noc-border);}
  .chat-head{padding:14px 20px;background:var(--chat-surface);border-bottom:1px solid var(--chat-border);display:flex;align-items:center;gap:10px;}
  .chat-avatar{width:34px;height:34px;border-radius:50%;background:var(--chat-accent);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .chat-head-text b{display:block;font-size:13.5px;color:var(--chat-text);}
  .chat-head-text span{font-size:11px;color:var(--chat-muted);}
  .chat-messages{flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:10px;}
  .bubble{max-width:82%;padding:11px 14px;border-radius:14px;font-size:13.5px;line-height:1.55;animation:rise .25s ease;}
  @keyframes rise{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .bubble.agent{background:var(--chat-surface);color:var(--chat-text);border:1px solid var(--chat-border);align-self:flex-start;border-bottom-left-radius:4px;}
  .bubble.user{background:var(--chat-accent);color:#fff;align-self:flex-end;border-bottom-right-radius:4px;}
  .typing{align-self:flex-start;background:var(--chat-surface);border:1px solid var(--chat-border);border-radius:14px;padding:11px 16px;display:flex;gap:4px;}
  .typing span{width:6px;height:6px;border-radius:50%;background:var(--chat-muted);animation:blink 1.2s infinite;}
  .typing span:nth-child(2){animation-delay:.2s;} .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.25;}40%{opacity:1;}}
  .chat-replies{padding:10px 16px 6px;display:flex;flex-wrap:wrap;gap:8px;background:var(--chat-bg);}
  .reply-btn{background:var(--chat-surface);border:1.5px solid var(--chat-accent);color:var(--chat-accent);font-size:12.5px;font-weight:600;padding:9px 14px;border-radius:20px;cursor:pointer;transition:all .15s;}
  .reply-btn:hover{background:var(--chat-accent);color:#fff;}
  .chat-inputbar{padding:12px 16px 16px;background:var(--chat-bg);display:flex;gap:8px;}
  .chat-inputbar input{flex:1;border:1px solid var(--chat-border);background:var(--chat-surface);border-radius:20px;padding:11px 16px;font-size:13px;color:var(--chat-text);outline:none;}
  .chat-inputbar input:focus{border-color:var(--chat-accent);}
  .send-btn{background:var(--chat-accent);color:#fff;border:none;border-radius:50%;width:42px;height:42px;cursor:pointer;font-size:15px;flex-shrink:0;}
  .restart-row{padding:0 16px 12px;text-align:center;}
  .restart-link{font-size:11.5px;color:var(--chat-muted);text-decoration:underline;cursor:pointer;background:none;border:none;}

  .orch-panel{background:var(--noc-bg);}
  .orch-head{padding:14px 20px;border-bottom:1px solid var(--noc-border);display:flex;align-items:center;justify-content:space-between;}
  .orch-head-left{display:flex;align-items:center;gap:10px;}
  .pulse{width:8px;height:8px;border-radius:50%;background:var(--c-gate);box-shadow:0 0 0 0 rgba(45,212,168,0.6);animation:pulse 2s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(45,212,168,0.5);}70%{box-shadow:0 0 0 7px rgba(45,212,168,0);}100%{box-shadow:0 0 0 0 rgba(45,212,168,0);}}
  .orch-head b{font-family:'Syne',sans-serif;font-size:13px;}
  .orch-head-right{text-align:right;}
  .lat-val{font-family:'DM Mono',monospace;font-size:16px;font-weight:600;color:var(--c-mcp);}
  .lat-lbl{font-size:9.5px;color:var(--noc-muted);text-transform:uppercase;letter-spacing:.5px;}
  .orch-log{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:8px;}
  .log-entry{background:var(--noc-surface);border:1px solid var(--noc-border);border-left:3px solid var(--c-mcp);border-radius:0 8px 8px 0;padding:10px 14px;animation:rise .3s ease;}
  .log-top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:4px;}
  .log-type{font-family:'DM Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
  .log-ms{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--noc-muted);white-space:nowrap;}
  .log-label{font-size:12.5px;font-weight:600;color:var(--noc-text);}
  .log-detail{font-size:11.5px;color:var(--noc-muted);font-family:'DM Mono',monospace;margin-top:2px;}
  .orch-empty{color:var(--noc-muted);font-size:12px;text-align:center;padding:40px 10px;}
  .orch-legend{padding:10px 18px 14px;border-top:1px solid var(--noc-border);display:flex;gap:10px;flex-wrap:wrap;}
  .leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--noc-muted);}
  .leg .dot{width:7px;height:7px;border-radius:50%;}

  @media (max-width:900px){
    .mobile-tabs{display:flex;}
    .breadcrumb{display:none;}
    .shell{position:relative;}
    .panel{position:absolute;inset:0;display:none;}
    .panel.mobile-active{display:flex;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-title">Protótipo Navegável v3 · 3 UFs</div>
    <div class="topbar-sub">SP · RJ · MG — mesma regra parametrizada, mesma infraestrutura</div>
  </div>
  <div class="topbar-mid">
    <span class="uf-chip" id="ufChip"></span>
    <div class="breadcrumb" id="breadcrumb"></div>
  </div>
  <div class="mobile-tabs">
    <button class="mtab active" id="mtab-chat" onclick="switchMobile('chat')">💬 Chat</button>
    <button class="mtab" id="mtab-orch" onclick="switchMobile('orch')">⚙️ Orquestração<span class="badge" id="mtab-badge" style="display:none">0</span></button>
  </div>
</div>

<div class="shell">
  <div class="panel chat-panel mobile-active" id="panel-chat">
    <div class="chat-head">
      <div class="chat-avatar">🚗</div>
      <div class="chat-head-text"><b>Assistente de Checkout Veicular</b><span>Bradesco · App</span></div>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-replies" id="chatReplies"></div>
    <div class="chat-inputbar">
      <input type="text" id="chatInput" placeholder="Escreva ou use as opções acima…" onkeydown="if(event.key==='Enter')sendFreeText()">
      <button class="send-btn" onclick="sendFreeText()">➤</button>
    </div>
    <div class="restart-row"><button class="restart-link" onclick="restart()">↺ reiniciar demonstração</button></div>
  </div>

  <div class="panel orch-panel" id="panel-orch">
    <div class="orch-head">
      <div class="orch-head-left"><span class="pulse"></span><b>Painel de Orquestração</b></div>
      <div class="orch-head-right"><div class="lat-val" id="latVal">0 ms</div><div class="lat-lbl">latência acumulada</div></div>
    </div>
    <div class="orch-log" id="orchLog"><div class="orch-empty">Aguardando início da jornada…</div></div>
    <div class="orch-legend">
      <div class="leg"><span class="dot" style="background:var(--c-gateway)"></span>AI Gateway</div>
      <div class="leg"><span class="dot" style="background:var(--c-rag)"></span>RAG</div>
      <div class="leg"><span class="dot" style="background:var(--c-mcp)"></span>MCP Tool</div>
      <div class="leg"><span class="dot" style="background:var(--c-gate)"></span>Gate de Política</div>
      <div class="leg"><span class="dot" style="background:var(--c-audit)"></span>Auditoria</div>
    </div>
  </div>
</div>

<script>
const COLORS = {gateway:'var(--c-gateway)', rag:'var(--c-rag)', mcp:'var(--c-mcp)', gate:'var(--c-gate)', audit:'var(--c-audit)'};
const LABELS = {gateway:'AI Gateway', rag:'RAG', mcp:'MCP Tool', gate:'Gate de Política', audit:'Auditoria'};
const STAGES = ['Veículo','Tributos','Pagamento','Confirmação'];

// ---- Catálogo parametrizado por UF (mesmo padrão do Débito Veicular: discriminated union por UF) ----
const UF_DATA = {
  SP: { plate:'ABC1D23', vehicleLabel:'Volkswagen Polo 2023', fipe:72400, ipvaPct:4, ipvaValue:2896, licensing:187, transferFee:312,
        ragDoc:'regra_tributaria_SP_2026', ragSim:'0.94', ragMs:95, protoSuffix:'88341', taxProtoSuffix:'77291', vistoriaDate:'05/07' },
  RJ: { plate:'XYZ9F87', vehicleLabel:'Hyundai HB20 2022', fipe:58900, ipvaPct:4, ipvaValue:2356, licensing:233, transferFee:145,
        ragDoc:'regra_tributaria_RJ_2026', ragSim:'0.91', ragMs:110, protoSuffix:'90112', taxProtoSuffix:'65508', vistoriaDate:'09/07' },
  MG: { plate:'QRS5T46', vehicleLabel:'Fiat Pulse 2023', fipe:89200, ipvaPct:3, ipvaValue:2676, licensing:165, transferFee:198,
        ragDoc:'regra_tributaria_MG_2026', ragSim:'0.89', ragMs:102, protoSuffix:'53309', taxProtoSuffix:'40217', vistoriaDate:'14/07' }
};
function total(d){ return d.fipe + d.ipvaValue + d.licensing + d.transferFee; }
function fmt(n){ return Math.round(n).toLocaleString('pt-BR'); }

let ctx = { uf: null };

const STEPS = {
  start: {
    stage: 0,
    agent: ["Olá! Sou o assistente de Checkout Veicular do Bradesco 🚗 Posso te ajudar a organizar o pagamento do seu veículo, incluindo IPVA, emplacamento e taxas — tudo em um só lugar."],
    events: [{type:'gateway', label:'Sessão autenticada', detail:'OAuth2 + CIAM · token emitido', ms:140}],
    replies: [{label:'Comprei um carro, quero organizar o pagamento', next:'confirm_plate'}]
  },
  confirm_plate: {
    stage: 0,
    agent: ["Show! Pra localizar o veículo, me confirma a placa e o estado (UF)."],
    events: [],
    replies: [
      {label:'Placa ABC1D23 · SP', next:'show_valuation', setUF:'SP'},
      {label:'Placa XYZ9F87 · RJ', next:'show_valuation', setUF:'RJ'},
      {label:'Placa QRS5T46 · MG', next:'show_valuation', setUF:'MG'}
    ]
  },
  show_valuation: {
    stage: 1,
    agent: (c)=>{ const d=UF_DATA[c.uf]; const t=total(d); return [
      `Encontrei: ${d.vehicleLabel}, placa ${d.plate}, UF ${c.uf}. Valor de referência (FIPE): R$ ${fmt(d.fipe)}.`,
      `Com base nas regras tributárias de ${c.uf}: veículo R$ ${fmt(d.fipe)} + IPVA (${d.ipvaPct}%) R$ ${fmt(d.ipvaValue)} + licenciamento R$ ${fmt(d.licensing)} + taxa de transferência R$ ${fmt(d.transferFee)} → Total R$ ${fmt(t)}.`
    ];},
    events: (c)=>{ const d=UF_DATA[c.uf]; return [
      {type:'mcp', label:'consultar_veiculo', detail:`MCP → RENAVAM / FIPE (sintético) · UF ${c.uf}`, ms:620},
      {type:'rag', label:d.ragDoc, detail:`RAG → similaridade ${d.ragSim} · catálogo parametrizado por UF`, ms:d.ragMs}
    ];},
    replies: [
      {label:'Quero pagar tudo agora', next:'gate_check'},
      {label:'Quero simular financiamento primeiro', next:'financing_sim'}
    ]
  },
  financing_sim: {
    stage: 1,
    agent: (c)=>{ const d=UF_DATA[c.uf]; const parcela = Math.round(total(d)*1.15/48); return [
      `Simulando com o CaaS: em 48x, a parcela fica em R$ ${fmt(parcela)}/mês (taxa 1,79% a.m.). Posso seguir com essa opção?`
    ];},
    events: [{type:'mcp', label:'simular_credito', detail:'MCP → CaaS · motor de score', ms:280}],
    replies: [
      {label:'Sim, seguir com o financiamento', next:'gate_check'},
      {label:'Não, pagar à vista', next:'gate_check'}
    ]
  },
  gate_check: {
    stage: 2,
    agent: (c)=>{ const d=UF_DATA[c.uf]; const t=total(d); return [
      `Perfeito. Como o valor (R$ ${fmt(t)}) está dentro do limite de auto-aprovação (R$ 80.000), o pagamento é liberado automaticamente — sem necessidade de validação manual.`
    ];},
    events: (c)=>{ const d=UF_DATA[c.uf]; return [
      {type:'gate', label:'Gate de Política', detail:`Valor de R$ ${fmt(total(d))} dentro do limite → aprovado automaticamente`, ms:12}
    ];},
    auto: 'processing'
  },
  processing: {
    stage: 2,
    agent: ["Processando pagamento ao vendedor e dos tributos…"],
    events: (c)=>[
      {type:'mcp', label:'executar_pagamento_veiculo', detail:'MCP → liquidação ao vendedor', ms:710},
      {type:'mcp', label:'pagar_tributo_SEFAZ', detail:`MCP → convênio de arrecadação SEFAZ-${c.uf} (IPVA + licenciamento)`, ms:1380},
      {type:'mcp', label:'agendar_emplacamento_DETRAN', detail:`MCP → DETRAN-${c.uf}`, ms:890}
    ],
    auto: 'summary'
  },
  summary: {
    stage: 3,
    agent: (c)=>{ const d=UF_DATA[c.uf]; return [
      `Tudo certo! ✅ Pagamento confirmado (protocolo BRD-2026-${d.protoSuffix}), tributos pagos (protocolo SEFAZ-${c.uf}-${d.taxProtoSuffix}) e vistoria de emplacamento agendada para ${d.vistoriaDate}. Você acompanha tudo pelo app.`
    ];},
    events: [{type:'audit', label:'Trilha de auditoria registrada', detail:'Jornada completa · log imutável', ms:35}],
    replies: [{label:'↺ Reiniciar demonstração', next:'start', isRestart:true}]
  }
};

let totalLatency = 0;
let eventCount = 0;

function el(tag, cls, html){ const e=document.createElement(tag); if(cls)e.className=cls; if(html!==undefined)e.innerHTML=html; return e; }

function renderBreadcrumb(activeStage){
  const bc = document.getElementById('breadcrumb'); bc.innerHTML='';
  STAGES.forEach((s,i)=>{
    const d = el('div', 'bc-step'+(i===activeStage?' active':i<activeStage?' done':''), (i+1)+'. '+s);
    bc.appendChild(d);
  });
}

function updateUFChip(){
  const chip = document.getElementById('ufChip');
  if(ctx.uf){ chip.style.display='inline-block'; chip.textContent = 'UF: '+ctx.uf; }
  else { chip.style.display='none'; }
}

function addBubble(text, who){
  const wrap = document.getElementById('chatMessages');
  wrap.appendChild(el('div', 'bubble '+who, text));
  wrap.scrollTop = wrap.scrollHeight;
}
function showTyping(){
  const wrap = document.getElementById('chatMessages');
  const t = el('div','typing','<span></span><span></span><span></span>');
  t.id='typingIndicator'; wrap.appendChild(t); wrap.scrollTop=wrap.scrollHeight;
}
function hideTyping(){ const t=document.getElementById('typingIndicator'); if(t) t.remove(); }

function addLog(ev){
  const log = document.getElementById('orchLog');
  const empty = log.querySelector('.orch-empty'); if(empty) empty.remove();
  const entry = el('div','log-entry');
  entry.style.borderLeftColor = COLORS[ev.type];
  const top = el('div','log-top');
  const typeSpan = el('span','log-type', LABELS[ev.type]); typeSpan.style.color = COLORS[ev.type];
  const msSpan = el('span','log-ms', ev.ms+' ms');
  top.appendChild(typeSpan); top.appendChild(msSpan);
  entry.appendChild(top);
  entry.appendChild(el('div','log-label', ev.label));
  entry.appendChild(el('div','log-detail', ev.detail));
  log.appendChild(entry); log.scrollTop = log.scrollHeight;

  totalLatency += ev.ms; eventCount += 1;
  document.getElementById('latVal').textContent = totalLatency.toLocaleString('pt-BR')+' ms';
  const badge = document.getElementById('mtab-badge');
  badge.style.display='inline-block'; badge.textContent = eventCount;
}

function renderReplies(replies){
  const box = document.getElementById('chatReplies'); box.innerHTML='';
  if(!replies) return;
  replies.forEach(r=>{
    const b = el('button','reply-btn', r.label);
    b.onclick = ()=> r.isRestart ? restart() : goTo(r.next, r.label, r.setUF);
    box.appendChild(b);
  });
}

function resolve(val){ return typeof val === 'function' ? val(ctx) : val; }

function goTo(stepId, userText, setUF){
  if(setUF){ ctx.uf = setUF; updateUFChip(); }
  if(userText) addBubble(userText, 'user');
  document.getElementById('chatReplies').innerHTML='';
  const step = STEPS[stepId];
  renderBreadcrumb(step.stage);
  showTyping();
  setTimeout(()=>{
    hideTyping();
    const agentMsgs = resolve(step.agent);
    const eventsList = resolve(step.events);
    agentMsgs.forEach((msg,i)=>{ setTimeout(()=>addBubble(msg,'agent'), i*450); });
    eventsList.forEach((ev,i)=>{ setTimeout(()=>addLog(ev), 300 + i*450); });
    const settleDelay = 350 + (agentMsgs.length*450) + (eventsList.length*150);
    setTimeout(()=>{
      if(step.auto){ goTo(step.auto, null); }
      else { renderReplies(step.replies); }
    }, settleDelay);
  }, 550);
}

function sendFreeText(){
  const input = document.getElementById('chatInput');
  const val = input.value.trim();
  if(!val) return;
  addBubble(val, 'user');
  input.value='';
  showTyping();
  setTimeout(()=>{
    hideTyping();
    addBubble('Nesta demonstração, segue uma das opções sugeridas abaixo 👇 — assim conseguimos ilustrar o fluxo completo.', 'agent');
  }, 500);
}

function switchMobile(view){
  document.getElementById('panel-chat').classList.toggle('mobile-active', view==='chat');
  document.getElementById('panel-orch').classList.toggle('mobile-active', view==='orch');
  document.getElementById('mtab-chat').classList.toggle('active', view==='chat');
  document.getElementById('mtab-orch').classList.toggle('active', view==='orch');
}

function restart(){
  ctx = { uf: null }; updateUFChip();
  document.getElementById('chatMessages').innerHTML='';
  document.getElementById('chatReplies').innerHTML='';
  document.getElementById('orchLog').innerHTML='<div class="orch-empty">Aguardando início da jornada…</div>';
  totalLatency = 0; eventCount = 0;
  document.getElementById('latVal').textContent = '0 ms';
  document.getElementById('mtab-badge').style.display='none';
  goTo('start', null);
}

restart();
</script>
</body>
</html>
